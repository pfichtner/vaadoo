name: Release to Maven Central

on:
  push:
    branches: [ release/release ]

jobs:
  build:
    name: Release project
    runs-on: ubuntu-latest

    steps:

    - name: Check out sources
      uses: actions/checkout@v7

    - name: Read Java version from .java-version
      id: read-version
      run: echo "version=$(cat .java-version)" >> $GITHUB_OUTPUT

    - name: Set up JDK ${{ steps.read-version.outputs.version }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ steps.read-version.outputs.version }}
        cache: 'maven'

    - name: Install GPG key
      run: |
        echo "${{ secrets.GPG_PRIVATE_KEY }}" > gpg.asc
        echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --import gpg.asc

    - name: Release to Maven Central OSSRH
      env:
          CENTRAL_OSSRH_USERNAME: ${{ secrets.CENTRAL_OSSRH_USERNAME }}
          CENTRAL_OSSRH_PASSWORD: ${{ secrets.CENTRAL_OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        ./mvnw -B clean deploy -Psonatype -s settings.xml
